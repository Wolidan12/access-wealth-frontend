<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Agent Dashboard | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #070d14;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Layout */
        .agent-container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Users List */
        .users-sidebar {
            width: 320px;
            background: #0a1622;
            border-right: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #8a99af;
        }

        .search-box {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #d4af37;
        }

        .search-box .search-icon {
            position: relative;
        }

        .search-box .search-icon i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a99af;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-card {
            background: rgba(17, 42, 70, 0.4);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .user-card:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .user-card.active {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
        }

        .user-card .user-name {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .user-card .user-name h4 {
            font-size: 15px;
            font-weight: 600;
        }

        .user-card .user-name .badge {
            background: #ff4d4d;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .user-card .last-message {
            font-size: 12px;
            color: #8a99af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-card .time {
            font-size: 10px;
            color: #6c7a8a;
            margin-top: 5px;
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #070d14;
        }

        .chat-header {
            padding: 20px 30px;
            background: #0a1622;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header .user-info h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header .user-info p {
            font-size: 12px;
            color: #2ecc71;
        }

        .chat-header .status i {
            color: #2ecc71;
            font-size: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message.user {
            background: rgba(255, 255, 255, 0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.agent {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message .sender {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .message .time {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 5px;
            text-align: right;
        }

        .chat-input-area {
            padding: 20px 30px;
            background: #0a1622;
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            gap: 15px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 14px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: #d4af37;
        }

        .chat-input-area button {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            color: #0b1421;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input-area button:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .chat-input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #8a99af;
            margin-top: auto;
            margin-bottom: auto;
        }

        .logout-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 12px;
            margin: 15px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #e04343;
        }

        @media (max-width: 768px) {
            .users-sidebar {
                width: 280px;
                position: absolute;
                left: -280px;
                z-index: 1000;
                transition: left 0.3s;
            }
            .users-sidebar.open {
                left: 0;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="agent-container">
        <!-- Users Sidebar -->
        <div class="users-sidebar" id="usersSidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-headset"></i> Support Dashboard</h2>
                <p>Manage all user conversations</p>
            </div>
            <div class="search-box">
                <div class="search-icon">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="searchUsers" placeholder="Search users by name...">
                </div>
            </div>
            <div class="users-list" id="usersList">
                <div style="text-align: center; padding: 20px;">Loading users...</div>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="user-info">
                    <h3 id="activeUserName">Select a user</h3>
                    <p id="activeUserStatus"><i class="fa-solid fa-circle"></i> Select a conversation to start</p>
                </div>
                <div class="status">
                    <i class="fa-solid fa-circle"></i> Online
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="empty-state">
                    <i class="fa-solid fa-comments" style="font-size: 48px; opacity: 0.3; margin-bottom: 15px; display: block;"></i>
                    <p>Select a user from the left panel to start chatting</p>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Type your response here..." disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled><i class="fa-solid fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        let currentUser = null;
        let allUsers = [];
        let messageInterval = null;

        window.onload = () => {
            const role = localStorage.getItem('role');
            if (role !== 'support') {
                window.location.href = '/login.html';
                return;
            }
            loadAllUsers();
            setInterval(loadAllUsers, 10000);
        };

        async function loadAllUsers() {
            try {
                // Get all users from admin endpoint
                const { ok, data } = await window.apiFetchJson('/admin/users');
                if (ok && data.success) {
                    allUsers = data.users;
                    renderUsersList(allUsers);
                }
            } catch (e) {
                console.error("Load users error:", e);
                document.getElementById('usersList').innerHTML = '<div style="text-align: center; padding: 20px; color: #ff4d4d;">Failed to load users</div>';
            }
        }

        function renderUsersList(users) {
            const container = document.getElementById('usersList');
            if (!users || users.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px;">No users found</div>';
                return;
            }

            container.innerHTML = '';
            users.forEach(user => {
                const userCard = document.createElement('div');
                userCard.className = `user-card ${currentUser === user.username ? 'active' : ''}`;
                userCard.setAttribute('data-username', user.username);
                userCard.innerHTML = `
                    <div class="user-name">
                        <h4><i class="fa-solid fa-user-circle"></i> ${user.username}</h4>
                        <span class="badge" id="badge-${user.username}" style="display: none;">New</span>
                    </div>
                    <div class="last-message" id="lastMsg-${user.username}">Click to start conversation</div>
                    <div class="time" id="lastTime-${user.username}"></div>
                `;
                userCard.onclick = () => selectUser(user.username);
                container.appendChild(userCard);
            });
        }

        function filterUsers() {
            const searchTerm = document.getElementById('searchUsers').value.toLowerCase();
            const filtered = allUsers.filter(user => user.username.toLowerCase().includes(searchTerm));
            renderUsersList(filtered);
        }

        document.getElementById('searchUsers').addEventListener('input', filterUsers);

        async function selectUser(username) {
            currentUser = username;
            
            // Update active state in sidebar
            document.querySelectorAll('.user-card').forEach(card => {
                if (card.getAttribute('data-username') === username) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });

            // Update header
            document.getElementById('activeUserName').innerText = username;
            document.getElementById('activeUserStatus').innerHTML = '<i class="fa-solid fa-circle"></i> Active conversation';
            
            // Enable input
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            // Clear previous interval
            if (messageInterval) clearInterval(messageInterval);
            
            // Load messages
            await loadMessages();
            messageInterval = setInterval(loadMessages, 5000);
        }

        async function loadMessages() {
            if (!currentUser) return;
            
            try {
                const { ok, data } = await window.apiFetchJson(`/chat/history/${currentUser}`);
                if (ok && data.success) {
                    const container = document.getElementById('chatMessages');
                    container.innerHTML = '';
                    
                    if (!data.messages || data.messages.length === 0) {
                        // Send auto welcome message when first time
                        await sendAutoWelcome();
                        return;
                    }
                    
                    data.messages.forEach(msg => {
                        const messageDiv = document.createElement('div');
                        const isAgent = (msg.sender === 'support' || msg.sender === 'Support_Agent');
                        messageDiv.className = `message ${isAgent ? 'agent' : 'user'}`;
                        messageDiv.innerHTML = `
                            <div class="sender">${isAgent ? 'Support Agent' : currentUser}</div>
                            <div class="text">${escapeHtml(msg.message)}</div>
                            <div class="time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                        `;
                        container.appendChild(messageDiv);
                    });
                    container.scrollTop = container.scrollHeight;
                    
                    // Remove badge if exists
                    const badge = document.getElementById(`badge-${currentUser}`);
                    if (badge) badge.style.display = 'none';
                }
            } catch (e) {
                console.error("Load messages error:", e);
            }
        }

        async function sendAutoWelcome() {
            const welcomeMessage = "👋 Hello! I'm an Access Wealth support agent. How may I help you today?";
            
            try {
                const { ok, data } = await window.apiFetchJson('/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: currentUser, message: welcomeMessage })
                });
                
                if (ok && data.success) {
                    await loadMessages();
                }
            } catch (e) {
                console.error("Auto welcome error:", e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !currentUser) return;
            
            input.value = '';
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            try {
                const { ok, data } = await window.apiFetchJson('/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: currentUser, message: message })
                });
                
                if (ok && data.success) {
                    await loadMessages();
                } else {
                    alert(data.error || "Failed to send message");
                    input.value = message;
                }
            } catch (err) {
                console.error("Send error:", err);
                alert("Failed to send message");
                input.value = message;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
