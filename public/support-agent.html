<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Support Agent | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #070d14;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .agent-container {
            display: flex;
            height: 100%;
            position: relative;
        }

        .users-sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: #0a1622;
            z-index: 100;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(212, 175, 55, 0.15);
        }

        .users-sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header h3 {
            font-size: 16px;
        }

        .sidebar-header p {
            font-size: 11px;
            color: #8a99af;
        }

        .search-box {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #d4af37;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .user-item {
            padding: 12px;
            background: rgba(17,42,70,0.4);
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .user-item:hover {
            background: rgba(212,175,55,0.1);
        }

        .user-item.active {
            background: rgba(212,175,55,0.15);
            border-color: #d4af37;
        }

        .user-name {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-name h4 {
            font-size: 14px;
        }

        .last-msg {
            font-size: 11px;
            color: #8a99af;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #070d14;
        }

        .chat-header {
            background: #0a1622;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(212,175,55,0.15);
        }

        .menu-btn {
            background: transparent;
            border: none;
            color: #d4af37;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:hover {
            background: rgba(212,175,55,0.1);
        }

        .chat-header h3 {
            font-size: 16px;
            flex: 1;
        }

        .chat-header span {
            font-size: 11px;
            color: #2ecc71;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 13px;
            line-height: 1.4;
        }

        .message.user {
            background: rgba(255,255,255,0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.agent {
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message .sender {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .message .time {
            font-size: 9px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }

        .input-area {
            background: #0a1622;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(212,175,55,0.15);
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #d4af37;
        }

        .input-area button {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            color: #0b1421;
            font-weight: 600;
            cursor: pointer;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .logout-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px;
            margin: 12px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            color: #8a99af;
            padding: 40px;
        }

        @media (min-width: 768px) {
            .users-sidebar {
                position: relative;
                left: 0;
                width: 300px;
            }
            .menu-btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="agent-container">
        <div class="users-sidebar" id="usersSidebar">
            <div class="sidebar-header">
                <h3><i class="fa-solid fa-headset"></i> Support Dashboard</h3>
                <p>Manage all conversations</p>
            </div>
            <div class="search-box">
                <input type="text" id="searchUsers" placeholder="Search users...">
            </div>
            <div class="users-list" id="usersList">
                <div class="empty-state">Loading users...</div>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fa-solid fa-sign-out-alt"></i> Logout</button>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <h3 id="activeUserTitle">Select a user</h3>
                <span id="activeUserStatus"><i class="fa-solid fa-circle"></i></span>
            </div>

            <div class="messages-area" id="messagesArea">
                <div class="empty-state">
                    <i class="fa-solid fa-comments" style="font-size: 40px; opacity: 0.3; margin-bottom: 10px; display: block;"></i>
                    Select a user from the left panel to start chatting
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Type your response..." disabled>
                <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        let currentUser = null;
        let allUsers = [];
        let messageInterval = null;

        window.onload = () => {
            const role = localStorage.getItem('role');
            if (role !== 'support') {
                window.location.href = '/login.html';
                return;
            }
            loadAllUsers();
            setInterval(loadAllUsers, 15000);
        };

        function toggleSidebar() {
            document.getElementById('usersSidebar').classList.toggle('open');
        }

        async function loadAllUsers() {
            try {
                const { ok, data } = await window.apiFetchJson('/support/all-users');
                if (ok && data.success && data.users) {
                    allUsers = data.users;
                    renderUsersList(allUsers);
                } else {
                    console.error("Failed to load users:", data);
                    document.getElementById('usersList').innerHTML = '<div class="empty-state">Unable to load users. Please refresh.</div>';
                }
            } catch (e) {
                console.error("Load users error:", e);
                document.getElementById('usersList').innerHTML = '<div class="empty-state">Error loading users. Check console.</div>';
            }
        }

        function renderUsersList(users) {
            const container = document.getElementById('usersList');
            if (!users || users.length === 0) {
                container.innerHTML = '<div class="empty-state">No users found. Users will appear here when they register.</div>';
                return;
            }

            container.innerHTML = '';
            users.forEach(user => {
                const username = user.username;
                if (!username) return;
                
                const div = document.createElement('div');
                div.className = `user-item ${currentUser === username ? 'active' : ''}`;
                div.setAttribute('data-username', username);
                div.innerHTML = `
                    <div class="user-name">
                        <h4><i class="fa-solid fa-user"></i> ${username}</h4>
                    </div>
                    <div class="last-msg" id="lastMsg_${username.replace(/[^a-zA-Z0-9]/g, '_')}">Click to chat</div>
                `;
                div.onclick = () => selectUser(username);
                container.appendChild(div);
            });
        }

        function filterUsers() {
            const searchTerm = document.getElementById('searchUsers').value.toLowerCase();
            const filtered = allUsers.filter(user => user.username.toLowerCase().includes(searchTerm));
            renderUsersList(filtered);
        }

        document.getElementById('searchUsers').addEventListener('input', filterUsers);

        async function selectUser(username) {
            currentUser = username;
            document.getElementById('activeUserTitle').innerText = username;
            document.getElementById('activeUserStatus').innerHTML = '<i class="fa-solid fa-circle"></i> Online';
            document.getElementById('messageInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            document.querySelectorAll('.user-item').forEach(item => {
                if (item.getAttribute('data-username') === username) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            if (messageInterval) clearInterval(messageInterval);
            await loadMessages();
            messageInterval = setInterval(loadMessages, 5000);
            
            if (window.innerWidth < 768) {
                document.getElementById('usersSidebar').classList.remove('open');
            }
        }

        async function loadMessages() {
            if (!currentUser) return;
            
            try {
                const { ok, data } = await window.apiFetchJson(`/chat/history/${currentUser}`);
                if (ok && data.success) {
                    const container = document.getElementById('messagesArea');
                    container.innerHTML = '';
                    
                    if (!data.messages || data.messages.length === 0) {
                        container.innerHTML = '<div class="empty-state">No messages yet. Send a message to start the conversation!</div>';
                    } else {
                        data.messages.forEach(msg => {
                            const isAgent = (msg.sender === 'support' || msg.sender === 'Support_Agent' || msg.sender === 'admin');
                            const div = document.createElement('div');
                            div.className = `message ${isAgent ? 'agent' : 'user'}`;
                            div.innerHTML = `
                                <div class="sender">${isAgent ? 'Support Agent' : currentUser}</div>
                                <div>${escapeHtml(msg.message)}</div>
                                <div class="time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                            `;
                            container.appendChild(div);
                        });
                        container.scrollTop = container.scrollHeight;
                    }
                } else {
                    console.error("Failed to load messages:", data?.error);
                }
            } catch (err) {
                console.error("Load messages error:", err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !currentUser) return;
            
            input.value = '';
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            
            try {
                const { ok, data } = await window.apiFetchJson('/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: currentUser, message: message })
                });
                
                if (ok && data.success) {
                    await loadMessages();
                } else {
                    alert(data.error || "Failed to send message");
                    input.value = message;
                }
            } catch (err) {
                console.error("Send error:", err);
                alert("Failed to send message. Check your connection.");
                input.value = message;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }
    </script>
</body>
</htmlokn
