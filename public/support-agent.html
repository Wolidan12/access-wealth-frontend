<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Portal | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #070d14; --bg-cards: #112A46; --text-main: #ffffff; --primary-yellow: #d4af37; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 300px; background: var(--bg-cards); border-right: 1px solid rgba(212, 175, 55, 0.15); display: flex; flex-direction: column; }
        .logo-area { padding: 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--primary-yellow); text-align: center;}
        .user-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 15px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .user-item:hover, .user-item.active { background: rgba(212, 175, 55, 0.1); border-color: var(--primary-yellow); }
        .user-item h4 { font-size: 14px; margin-bottom: 5px; }
        .user-item .badge { background: #ff4d4d; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin-left: 8px; }
        
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-body); }
        .chat-header { padding: 20px; background: var(--bg-cards); border-bottom: 1px solid rgba(212, 175, 55, 0.15); display: flex; justify-content: space-between; align-items: center;}
        .chat-header h3 { font-size: 16px; }
        .chat-box { flex-grow: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 60%; padding: 12px 18px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .msg-user { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-support { background: rgba(212, 175, 55, 0.2); align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid var(--primary-yellow); }

        .chat-input-area { padding: 20px; background: var(--bg-cards); display: flex; gap: 15px; border-top: 1px solid rgba(212, 175, 55, 0.15); }
        .chat-input { flex-grow: 1; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; outline: none; }
        .chat-input:focus { border-color: var(--primary-yellow); }
        .btn-send { background: var(--primary-yellow); color: #0b1421; border: none; padding: 0 25px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn-send:hover:not(:disabled) { transform: scale(1.05); background: #fff; }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
        .logout-btn { padding: 15px; background: #ff4d4d; color: #fff; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; width: 100%; }
        .status-indicator { font-size: 12px; color: #2ecc71; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><i class="fa-solid fa-headset"></i> Support Portal</div>
        <div class="user-list" id="userList">
            <p style="text-align: center; color: #8a99af; font-size: 13px; margin-top: 20px;">Loading users...</p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout Agent</button>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <h3 id="activeChatUser">Select a user to start chatting</h3>
        </div>
        <div class="chat-box" id="chatBox">
            <p style="text-align: center; color: #8a99af; margin-top: auto; margin-bottom: auto;">Waiting for selection</p>
        </div>
        <div class="chat-input-area">
            <input type="text" id="msgInput" class="chat-input" placeholder="Type a response to the user" disabled>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        let currentUser = null;
        let messageInterval = null;

        window.onload = () => {
            const role = localStorage.getItem('role');
            if (role !== 'support') {
                window.location.href = '/login.html';
                return;
            }
            loadUsers();
            // Refresh user list every 10 seconds
            setInterval(loadUsers, 10000);
        };

        async function loadUsers() {
            try {
                const { ok, data } = await window.apiFetchJson('/support/users');
                if (ok && data.success) {
                    const list = document.getElementById('userList');
                    if (!data.users || data.users.length === 0) {
                        list.innerHTML = '<p style="text-align: center; color: #8a99af; margin-top: 20px;">✅ No active chats yet.</p>';
                        return;
                    }
                    list.innerHTML = '';
                    data.users.forEach(u => {
                        const div = document.createElement('div');
                        div.className = `user-item ${currentUser === u.user_id ? 'active' : ''}`;
                        div.innerHTML = `<h4><i class="fa-solid fa-user"></i> ${u.user_id}</h4>`;
                        div.onclick = () => selectUser(u.user_id);
                        list.appendChild(div);
                    });
                }
            } catch(e) {
                console.error("Load users error:", e);
                document.getElementById('userList').innerHTML = '<p style="text-align: center; color: #ff4d4d; margin-top: 20px;"><i class="fa-solid fa-triangle-exclamation"></i> Backend Offline. Please check your server.</p>';
            }
        }

        function selectUser(username) {
            currentUser = username;
            document.getElementById('activeChatUser').innerText = `Chatting with: ${username}`;
            document.getElementById('msgInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            
            // Clear previous interval
            if (messageInterval) clearInterval(messageInterval);
            
            loadMessages();
            messageInterval = setInterval(loadMessages, 5000);
        }

        async function loadMessages() {
            if (!currentUser) return;
            try {
                const { ok, data } = await window.apiFetchJson(`/chat/history/${currentUser}`);
                if (ok && data.success) {
                    const box = document.getElementById('chatBox');
                    box.innerHTML = '';
                    
                    data.messages.forEach(msg => {
                        const div = document.createElement('div');
                        // Messages from 'support' or from the agent's username are support messages
                        const isSupport = (msg.sender === 'support' || msg.sender === 'Support_Agent');
                        div.className = `message ${isSupport ? 'msg-support' : 'msg-user'}`;
                        const senderName = isSupport ? 'Support Agent' : currentUser;
                        div.innerHTML = `<strong style="font-size: 11px; opacity: 0.7;">${senderName}:</strong><br>${msg.message}`;
                        box.appendChild(div);
                    });
                    box.scrollTop = box.scrollHeight;
                }
            } catch(e) {
                console.error("Load messages error:", e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if (!input.value.trim() || !currentUser) return;
            
            const text = input.value.trim();
            input.value = '';
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const { ok, data } = await window.apiFetchJson('/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: currentUser, message: text })
                });

                if (ok && data.success) {
                    loadMessages();
                } else {
                    alert(data.error || "Failed to send message");
                    input.value = text;
                }
            } catch (err) {
                console.error("Send message error:", err);
                alert("Failed to send message. Please try again.");
                input.value = text;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = '/login.html'; 
        }
    </script>
</body>
</html>
