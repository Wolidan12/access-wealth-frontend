<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Live Support | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #070d14;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .chat-header {
            background: #112A46;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .chat-header i {
            font-size: 24px;
            color: #d4af37;
        }

        .chat-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .chat-header p {
            font-size: 11px;
            color: #8a99af;
            margin-top: 2px;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: #d4af37;
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Messages area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.support {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.3);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message.user {
            background: #1a2a4a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message .sender {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .message .time {
            font-size: 9px;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }

        /* Input area */
        .input-area {
            background: #112A46;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 25px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: #d4af37;
        }

        .input-area button {
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            color: #0b1421;
            cursor: pointer;
            font-size: 18px;
            transition: 0.2s;
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #8a99af;
            padding: 40px;
        }

        @media (min-width: 768px) {
            body {
                max-width: 600px;
                margin: 0 auto;
                box-shadow: 0 0 20px rgba(0,0,0,0.3);
            }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <button class="back-btn" onclick="window.location.href='/dashboard.html'"><i class="fa-solid fa-arrow-left"></i></button>
        <div>
            <h2><i class="fa-solid fa-headset"></i> Live Support</h2>
            <p>We typically reply within a few minutes</p>
        </div>
    </div>

    <div class="messages-area" id="messagesArea">
        <div class="empty-state">
            <i class="fa-solid fa-comments" style="font-size: 40px; opacity: 0.3; margin-bottom: 10px; display: block;"></i>
            Loading messages...
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Type your message here...">
        <button id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <script src="global.js"></script>
    <script>
        let messageInterval = null;

        window.onload = () => {
            const username = localStorage.getItem('username');
            if (!username) {
                window.location.href = '/login.html';
                return;
            }
            loadMessages();
            messageInterval = setInterval(loadMessages, 5000);
            // Send welcome message on first load
            sendWelcomeMessage();
        };

        async function sendWelcomeMessage() {
            try {
                await window.apiFetchJson('/chat/welcome', { method: 'POST' });
            } catch(e) {}
        }

        async function loadMessages() {
            const username = localStorage.getItem('username');
            if (!username) return;

            try {
                const { ok, data } = await window.apiFetchJson(`/chat/history/${username}`);
                if (ok && data.success) {
                    const container = document.getElementById('messagesArea');
                    container.innerHTML = '';
                    
                    if (!data.messages || data.messages.length === 0) {
                        container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-comments" style="font-size: 40px; opacity: 0.3; margin-bottom: 10px; display: block;"></i>No messages yet. Send a message to start the conversation!</div>';
                    } else {
                        data.messages.forEach(msg => {
                            const isSupport = (msg.sender === 'support' || msg.sender !== username);
                            const div = document.createElement('div');
                            div.className = `message ${isSupport ? 'support' : 'user'}`;
                            div.innerHTML = `
                                <div class="sender">${isSupport ? 'Support Agent' : 'You'}</div>
                                <div>${escapeHtml(msg.message)}</div>
                                <div class="time">${new Date(msg.created_at).toLocaleTimeString()}</div>
                            `;
                            container.appendChild(div);
                        });
                        container.scrollTop = container.scrollHeight;
                    }
                }
            } catch (err) {
                console.error("Load messages error:", err);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const username = localStorage.getItem('username');
            const message = input.value.trim();
            
            if (!message || !username) return;

            input.value = '';
            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const { ok, data } = await window.apiFetchJson('/chat/send', {
                    method: 'POST',
                    body: JSON.stringify({ user_id: username, message: message })
                });

                if (ok && data.success) {
                    await loadMessages();
                } else {
                    alert(data.error || "Failed to send message");
                    input.value = message;
                }
            } catch (err) {
                console.error("Send error:", err);
                alert("Failed to send message. Please try again.");
                input.value = message;
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
