<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #070d14; --bg-cards: #112A46; --text-main: #ffffff; --text-muted: #8a99af; --primary-yellow: #d4af37; --yellow-gradient: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: var(--bg-cards); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .auth-logo { font-size: 30px; color: var(--primary-yellow); margin-bottom: 10px; }
        .auth-card h2 { font-size: 24px; margin-bottom: 5px; }
        .auth-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-yellow); }
        .form-control { width: 100%; padding: 15px 15px 15px 45px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary-yellow); }
        .btn-auth { width: 100%; padding: 15px; border-radius: 50px; background: var(--yellow-gradient); color: #0b1421; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .auth-links { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .auth-links a { color: var(--primary-yellow); text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <i class="fa-solid fa-key auth-logo"></i>
        <h2>Reset Your Password</h2>
        <p id="resetDescription">Enter a new password below to complete the reset process.</p>

        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="newPassword" class="form-control" placeholder="New password" required>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                </div>
            </div>

            <button type="submit" class="btn-auth" id="resetBtn">Reset Password</button>
        </form>

        <div class="auth-links">
            Remembered your password? <a href="login.html">Login here</a>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const resetDescription = document.getElementById('resetDescription');
        const resetForm = document.getElementById('resetForm');

        if (!token) {
            resetDescription.innerText = 'No reset token was provided. Please use the link sent to your email, or request a new password reset.';
            document.getElementById('newPassword').disabled = true;
            document.getElementById('confirmPassword').disabled = true;
            document.getElementById('resetBtn').disabled = true;
        }

        async function submitReset(password, tokenValue) {
            const endpoints = ['/reset-password', '/password-reset', '/auth/reset-password'];
            let lastError = 'Unable to reset password.';

            for (const path of endpoints) {
                const { ok, data, error } = await apiFetchJson(path, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, token: tokenValue })
                });

                if (ok && data.success) return { ok: true, data };
                if (data && data.error) lastError = data.error;
                if (error) lastError = error;
            }

            return { ok: false, error: lastError };
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const password = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (!token) {
                showToast('error', 'This reset link is invalid or missing a token. Request a new reset.');
                return;
            }
            if (password.length < 6) {
                showToast('error', 'Password must be at least 6 characters.');
                return;
            }
            if (password !== confirmPassword) {
                showToast('error', 'Passwords do not match.');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting';
            btn.disabled = true;

            try {
                const { ok, data, error } = await submitReset(password, token);
                if (ok) {
                    showToast('success', data.message || 'Password updated successfully.');
                    setTimeout(() => { window.location.href = 'login.html'; }, 4000);
                } else {
                    showToast('error', data?.error || error || 'Reset failed.');
                }
            } catch (err) {
                console.error(err);
                showToast('error', 'Server error. Please try again later.');
            } finally {
                btn.innerHTML = 'Reset Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
