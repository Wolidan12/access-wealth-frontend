<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Links | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #070d14; --bg-cards: #112A46; --text-main: #ffffff; --text-muted: #8a99af; --primary-yellow: #d4af37; --yellow-gradient: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); --border-light: rgba(212, 175, 55, 0.15); --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden;}

        .sidebar { width: var(--sidebar-width); background: var(--bg-cards); height: 100vh; position: fixed; border-right: 1px solid var(--border-light); z-index: 1100; display: flex; flex-direction: column; }
        .logo-area { padding: 25px 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; }
        .logo-area i { color: var(--primary-yellow); font-size: 24px; }
        .nav-menu { padding: 20px 15px; overflow-y: auto; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; margin-bottom: 5px; font-size: 14px; transition: 0.3s; }
        .nav-item i.main-icon { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary-yellow); }
        .nav-item.active { background: var(--primary-yellow); color: #0b1421; font-weight: 600; }
        
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; }
        
        /* Header & Create Button */
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .page-header h1 { font-size: 28px; color: var(--text-main); }
        .page-header p { color: var(--text-muted); font-size: 14px; }
        .btn-create { background: var(--yellow-gradient); color: #0b1421; padding: 12px 25px; border-radius: 50px; font-weight: 600; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;}
        .btn-create:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-cards); border: 1px solid var(--border-light); padding: 25px; border-radius: 15px; display: flex; flex-direction: column; }
        .stat-icon { width: 40px; height: 40px; background: rgba(212, 175, 55, 0.1); color: var(--primary-yellow); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: 15px;}
        .stat-card h2 { font-size: 24px; color: #fff; margin-bottom: 5px; }
        .stat-card p { font-size: 13px; color: var(--text-muted); }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border-light); padding-bottom: 15px;}
        .tab-btn { background: transparent; border: none; color: var(--text-muted); font-size: 14px; font-weight: 500; padding: 10px 30px; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary-yellow); color: #0b1421; font-weight: 600; }

        /* Empty State Area */
        .main-card { background: var(--bg-cards); border: 1px dashed var(--border-light); padding: 80px 20px; border-radius: 20px; text-align: center; }
        .empty-icon { font-size: 50px; color: rgba(212, 175, 55, 0.2); margin-bottom: 15px; }
        .main-card h3 { color: var(--text-main); margin-bottom: 5px; }
        .main-card p { color: var(--text-muted); font-size: 14px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
            .stats-grid { grid-template-columns: 1fr; }
            .header-flex { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><i class="fa-solid fa-crown"></i> ACCESS WEALTH</div>
        <div class="nav-menu">
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-border-all main-icon"></i> Dashboard</a>
            <a href="payment-links.html" class="nav-item active"><i class="fa-solid fa-link main-icon"></i> Payment Links</a>
            <a href="invoice.html" class="nav-item"><i class="fa-solid fa-file-lines main-icon"></i> Invoice</a>
            <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-arrow-left main-icon"></i> Back</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header-flex">
            <div class="page-header">
                <h1>Payment Links</h1>
                <p>Create & share links to collect payments</p>
            </div>
            <button class="btn-create"><i class="fa-solid fa-plus"></i> Create Link</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fa-solid fa-link"></i></div>
                <h2>0</h2><p>Active Links</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color:#4caf50; background: rgba(76,175,80,0.1);"><i class="fa-solid fa-sack-dollar"></i></div>
                <h2>0</h2><p>Total Payments</p>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color:#9c27b0; background: rgba(156,39,176,0.1);"><i class="fa-solid fa-wallet"></i></div>
                <h2>₦0K</h2><p>Collected</p>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active">All</button>
            <button class="tab-btn">Active</button>
            <button class="tab-btn">Expired</button>
        </div>

        <div class="main-card">
            <i class="fa-solid fa-link empty-icon"></i>
            <h3>No links here</h3>
            <p>Create your first payment link to start collecting money.</p>
        </div>
    </div>
</body>
</html>
