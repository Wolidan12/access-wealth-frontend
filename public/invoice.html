<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Invoices | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #070d14; --bg-cards: #112A46; --text-main: #ffffff; --text-muted: #8a99af; --primary-yellow: #d4af37; --yellow-gradient: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); --border-light: rgba(212, 175, 55, 0.15); --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden;}

        .sidebar { width: var(--sidebar-width); background: var(--bg-cards); height: 100vh; position: fixed; border-right: 1px solid var(--border-light); z-index: 1100; display: flex; flex-direction: column; }
        .logo-area { padding: 25px 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; }
        .logo-area i { color: var(--primary-yellow); font-size: 24px; }
        .nav-menu { padding: 20px 15px; overflow-y: auto; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; margin-bottom: 5px; font-size: 14px; transition: 0.3s; }
        .nav-item i.main-icon { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary-yellow); }
        .nav-item.active { background: var(--primary-yellow); color: #0b1421; font-weight: 600; }
        
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; }
        
        /* Header & Create Button */
        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px; }
        .page-header h1 { font-size: 28px; color: var(--text-main); }
        .page-header p { color: var(--text-muted); font-size: 14px; }
        .btn-create { background: var(--yellow-gradient); color: #0b1421; padding: 12px 25px; border-radius: 50px; font-weight: 600; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;}
        .btn-create:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        /* Pill Tabs */
        .tabs-pill { display: flex; gap: 15px; margin-bottom: 25px; }
        .tab-pill-btn { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); font-size: 13px; font-weight: 500; padding: 10px 25px; cursor: pointer; border-radius: 50px; transition: 0.3s; }
        .tab-pill-btn.active { background: var(--primary-yellow); color: #0b1421; border-color: var(--primary-yellow); font-weight: 600; }
        .tab-pill-btn:hover:not(.active) { background: rgba(212, 175, 55, 0.1); color: var(--text-main); }

        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-cards); border: 1px solid var(--border-light); padding: 25px; border-radius: 15px; display: flex; align-items: center; gap: 20px; }
        .stat-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-icon.revenue { background: rgba(46, 204, 113, 0.1); color: #2ecc71; }
        .stat-icon.pending { background: rgba(243, 156, 18, 0.1); color: #f39c12; }
        .stat-details p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 5px; letter-spacing: 0.5px;}
        .stat-details h2 { font-size: 24px; color: #fff; }

        /* Main Card */
        .main-card { background: var(--bg-cards); border: 1px solid var(--border-light); border-radius: 20px; overflow: hidden; }
        .card-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .card-header h3 { font-size: 15px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .card-header i.icon-left { color: var(--primary-yellow); background: rgba(212, 175, 55, 0.1); padding: 8px; border-radius: 8px; }
        .card-actions i { color: var(--text-muted); margin-left: 15px; cursor: pointer; transition: 0.3s; }
        .card-actions i:hover { color: var(--primary-yellow); }
        
        .empty-state { padding: 80px 20px; text-align: center; }
        .empty-icon { font-size: 50px; color: rgba(212, 175, 55, 0.2); margin-bottom: 15px; }
        .empty-state p { color: var(--text-muted); font-size: 14px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
            .stats-row { grid-template-columns: 1fr; }
            .header-flex { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><i class="fa-solid fa-crown"></i> Access Wealth</div>
        <div class="nav-menu">
            <a href="/dashboard.html" class="nav-item"><i class="fa-solid fa-border-all main-icon"></i> Dashboard</a>
            <a href="/payment-links.html" class="nav-item"><i class="fa-solid fa-link main-icon"></i> Payment Links</a>
            <a href="/invoice.html" class="nav-item active"><i class="fa-solid fa-file-lines main-icon"></i> Invoice</a>
            <a href="/dashboard.html" class="nav-item"><i class="fa-solid fa-arrow-left main-icon"></i> Back</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header-flex">
            <div class="page-header">
                <h1>My Invoices</h1>
                <p>Manage your billing and receipts</p>
            </div>
            <button class="btn-create"><i class="fa-solid fa-plus"></i> Create Invoice</button>
        </div>

        <div class="tabs-pill">
            <button class="tab-pill-btn active">All History</button>
            <button class="tab-pill-btn">Last 30 Days</button>
            <button class="tab-pill-btn">Invoices</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon revenue"><i class="fa-solid fa-arrow-trend-up"></i></div>
                <div class="stat-details"><p>Revenue</p><h2>₦0</h2></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pending"><i class="fa-regular fa-clock"></i></div>
                <div class="stat-details"><p>Pending</p><h2>0</h2></div>
            </div>
        </div>

        <div class="main-card">
            <div class="card-header">
                <h3><i class="fa-solid fa-receipt icon-left"></i> Billing History</h3>
                <div class="card-actions">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <i class="fa-solid fa-filter"></i>
                </div>
            </div>
            <div class="empty-state">
                <i class="fa-solid fa-file-invoice empty-icon"></i>
                <p>No transactions found</p>
            </div>
        </div>
    </div>
</body>
</html>
