<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #070d14;
            --bg-cards: #112A46;
            --text-main: #ffffff;
            --text-muted: #8a99af;
            --primary-yellow: #d4af37;
            --yellow-gradient: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: var(--bg-cards); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .auth-logo { font-size: 30px; color: var(--primary-yellow); margin-bottom: 10px; }
        .auth-card h2 { font-size: 24px; margin-bottom: 5px; }
        .auth-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-yellow); }
        .form-control { width: 100%; padding: 15px 15px 15px 45px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary-yellow); }
        .btn-auth { width: 100%; padding: 15px; border-radius: 50px; background: var(--yellow-gradient); color: #0b1421; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
        .auth-links { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .auth-links a { color: var(--primary-yellow); text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }
        .error-msg { background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; border-radius: 10px; padding: 12px; margin-bottom: 20px; color: #ff4d4d; font-size: 14px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="auth-card">
        <i class="fa-solid fa-crown auth-logo"></i>
        <h2>Welcome Back</h2>
        <p>Login to your Access Wealth dashboard.</p>
        <div class="error-msg" id="errorMsg"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username / Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="loginUsername" class="form-control" placeholder="Enter your username or email" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>
            <button type="submit" class="btn-auth" id="loginBtn">Login to Dashboard</button>
        </form>
        <div class="auth-links">
            <a href="/forgot-password.html">Forgot Password?</a> | 
            <a href="/register.html">Create Account</a>
        </div>
    </div>
    <script src="global.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('errorMsg');
            errorEl.style.display = 'none';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying';
            btn.disabled = true;

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const { ok, data } = await window.apiFetchJson('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (ok && data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user.username);
                    localStorage.setItem('role', data.user.role);
                    localStorage.setItem('planActivated', data.user.planActivated || 'false');
                    localStorage.setItem('activePackage', data.user.activePackage || '');

                    if (data.user.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else if (data.user.role === 'support') {
                        window.location.href = '/support-agent.html';
                    } else {
                        window.location.href = '/dashboard.html';
                    }
                } else {
                    errorEl.innerText = data.error || "Invalid username or password";
                    errorEl.style.display = 'block';
                    btn.innerHTML = 'Login to Dashboard';
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Login error:", err);
                errorEl.innerText = "Server error. Please try again.";
                errorEl.style.display = 'block';
                btn.innerHTML = 'Login to Dashboard';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
