<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-body: #070d14; --bg-cards: #112A46; --text-main: #ffffff; --text-muted: #8a99af; --primary-yellow: #d4af37; --yellow-gradient: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .auth-card { background: var(--bg-cards); padding: 40px; border-radius: 20px; width: 100%; max-width: 450px; border: 1px solid rgba(212, 175, 55, 0.15); box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        .auth-logo { font-size: 30px; color: var(--primary-yellow); margin-bottom: 10px; }
        .auth-card h2 { font-size: 24px; margin-bottom: 5px; }
        .auth-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-yellow); }
        .form-control { width: 100%; padding: 15px 15px 15px 45px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: 0.3s;}
        .form-control:focus { border-color: var(--primary-yellow); }

        .btn-auth { width: 100%; padding: 15px; border-radius: 50px; background: var(--yellow-gradient); color: #0b1421; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px;}
        .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }

        .auth-links { margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .auth-links a { color: var(--primary-yellow); text-decoration: none; font-weight: 600; }
        .auth-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <i class="fa-solid fa-crown auth-logo"></i>
        <h2>Welcome Back</h2>
        <p>Login to your Access Wealth dashboard.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Username / Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="loginUsername" class="form-control" placeholder="Enter your username or email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn-auth" id="loginBtn">Login to Dashboard</button>
        </form>

        <div class="auth-links">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying';
            btn.disabled = true;

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            // ==========================================
            // STAFF LOGIN INTERCEPTOR (Admin & Support)
            // ==========================================
            if (username === 'admin@gmail.com' && password === 'Admin@234') {
                localStorage.setItem('role', 'admin');
                window.location.href = 'admin.html'; 
                return; // Stop here, don't check normal users
            }
            
            if (username === 'customer@gmail.com' && password === 'Support@234') {
                localStorage.setItem('role', 'support');
                window.location.href = 'admin-support.html';
                return; // Stop here, don't check normal users
            }

            // ==========================================
            // NORMAL USER LOGIN
            // ==========================================
            try {
                const response = await fetch('https://accesswealth-backend-production.up.railway.app/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('role', 'user');
                    localStorage.setItem('username', data.username);
                    localStorage.setItem('balance', data.balance);
                    localStorage.setItem('taskEarnings', data.taskEarnings);
                    localStorage.setItem('referralId', data.referralId);
                    localStorage.setItem('planActivated', data.planActivated);
                    localStorage.setItem('activePackage', data.activePackage);
                    
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.error || "Invalid username or password.");
                }
            } catch (err) {
                alert("Server error. Ensure your backend is running.");
            } finally {
                btn.innerHTML = 'Login to Dashboard';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
