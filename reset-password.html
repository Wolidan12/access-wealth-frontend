<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Access Wealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Same style as above – reuse */
        :root { --bg-body: #070d14; --bg-cards: #112A46; --text-main: #ffffff; --text-muted: #8a99af; --primary-yellow: #d4af37; --border-light: rgba(212, 175, 55, 0.15); --sidebar-width: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        .sidebar { width: var(--sidebar-width); background: var(--bg-cards); height: 100vh; position: fixed; border-right: 1px solid var(--border-light); display: flex; flex-direction: column; }
        .logo-area { padding: 25px 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; gap: 10px; }
        .logo-area i { color: var(--primary-yellow); font-size: 24px; }
        .nav-menu { padding: 20px 15px; flex-grow: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; margin-bottom: 5px; font-size: 14px; transition: 0.3s; }
        .nav-item i { margin-right: 15px; width: 20px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: rgba(212, 175, 55, 0.1); color: var(--primary-yellow); }
        .main-content { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px; }
        .page-header { margin-bottom: 30px; }
        .page-header h1 { font-size: 28px; color: var(--text-main); margin-bottom: 5px; }
        .page-header p { color: var(--text-muted); font-size: 14px; }
        .form-card { background: var(--bg-cards); border: 1px solid var(--border-light); border-radius: 20px; padding: 35px; max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        .form-control { width: 100%; padding: 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--primary-yellow); }
        .btn-submit { background: var(--primary-yellow); color: #0b1421; border: none; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #fff; transform: translateY(-2px); }
        .alert { padding: 12px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .alert.success { background: rgba(46,204,113,0.1); border: 1px solid #2ecc71; color: #2ecc71; }
        .alert.error { background: rgba(255,77,77,0.1); border: 1px solid #ff4d4d; color: #ff4d4d; }
        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; width: 100%; padding: 20px; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area"><i class="fa-solid fa-crown"></i> ACCESS WEALTH</div>
        <div class="nav-menu">
            <a href="/dashboard.html" class="nav-item"><i class="fa-solid fa-border-all"></i> Dashboard</a>
            <a href="/profile-settings.html" class="nav-item"><i class="fa-regular fa-user"></i> Profile Setting</a>
            <a href="/bank-details.html" class="nav-item"><i class="fa-solid fa-building-columns"></i> Set Bank Details</a>
            <a href="/reset-password.html" class="nav-item active"><i class="fa-solid fa-key"></i> Reset Password</a>
            <a href="#" class="nav-item" onclick="logout()" style="margin-top: 30px; color: #ff4d4d;"><i class="fa-solid fa-power-off"></i> Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Reset Password</h1>
            <p>Change your account password</p>
        </div>
        <div class="form-card">
            <div id="alertMsg" class="alert"></div>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" class="form-control" placeholder="Enter your current password" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Minimum 6 characters" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter new password" required>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Change Password</button>
            </form>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertDiv = document.getElementById('alertMsg');
            alertDiv.style.display = 'none';

            const current = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPass !== confirm) {
                alertDiv.className = 'alert error';
                alertDiv.innerText = 'New password and confirmation do not match';
                alertDiv.style.display = 'block';
                return;
            }
            if (newPass.length < 6) {
                alertDiv.className = 'alert error';
                alertDiv.innerText = 'New password must be at least 6 characters';
                alertDiv.style.display = 'block';
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            btn.disabled = true;

            const { ok, data } = await window.apiFetchJson('/user/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ current_password: current, new_password: newPass })
            });

            if (ok && data.success) {
                alertDiv.className = 'alert success';
                alertDiv.innerText = data.message + ' You will be logged out.';
                alertDiv.style.display = 'block';
                setTimeout(() => {
                    localStorage.clear();
                    window.location.href = '/login.html';
                }, 2000);
            } else {
                alertDiv.className = 'alert error';
                alertDiv.innerText = data.error || 'Failed to change password';
                alertDiv.style.display = 'block';
                btn.innerHTML = 'Change Password';
                btn.disabled = false;
            }
        });

        function logout() { localStorage.clear(); window.location.href = '/login.html'; }
    </script>
</body>
</html>
